<div class="container my-5">
  <div class="card shadow mx-auto" style="max-width: 700px;">
    <div class="card-body p-4">
      <h2 class="text-center mb-4">Cadastro</h2>
      
      <form #formCadastro="ngForm" (ngSubmit)="salvarCadastro()">
        
        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" class="form-control" [(ngModel)]="cliente.nome" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">CPF (Único)</label>
            <input type="text" name="cpf" class="form-control" [(ngModel)]="cliente.cpf" required placeholder="000.000.000-00">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-7">
            <label class="form-label">E-mail (Único)</label>
            <input type="email" name="email" class="form-control" [(ngModel)]="cliente.email" required placeholder="exemplo@email.com">
          </div>
          <div class="col-md-5">
            <label class="form-label">Telefone</label>
            <input type="text" name="telefone" class="form-control" [(ngModel)]="cliente.telefone" required placeholder="(00) 00000-0000">
          </div>
        </div>

        <hr>
        <h5>Endereço Completo</h5>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">CEP</label>
            <input type="text" name="cep" class="form-control" [(ngModel)]="cliente.cep" 
                   (blur)="buscarEnderecoPorCep()" required placeholder="00000-000">
            <small class="text-muted">Preenchimento automático</small>
          </div>
          <div class="col-md-8">
            <label class="form-label">Rua / Logradouro</label>
            <input type="text" name="logradouro" class="form-control" [(ngModel)]="cliente.logradouro" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-3">
            <label class="form-label">Número</label>
            <input type="text" name="numero" class="form-control" [(ngModel)]="cliente.numero" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Complemento</label>
            <input type="text" name="complemento" class="form-control" [(ngModel)]="cliente.complemento">
          </div>
          <div class="col-md-5">
            <label class="form-label">Bairro</label>
            <input type="text" name="bairro" class="form-control" [(ngModel)]="cliente.bairro" required>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-9">
            <label class="form-label">Cidade</label>
            <input type="text" name="cidade" class="form-control" [(ngModel)]="cliente.cidade" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">Estado (UF)</label>
            <input type="text" name="estado" class="form-control" [(ngModel)]="cliente.estado" required maxlength="2">
          </div>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg" [disabled]="!formCadastro.valid">
            Finalizar Cadastro
          </button>
          <a routerLink="/login" class="btn btn-link">Já tenho conta? Voltar ao Login</a>
        </div>

      </form>
    </div>
  </div>
</div>
