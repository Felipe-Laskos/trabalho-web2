<div class="login-container">
  <div class="login-card">
    <h3>Acesso ao Sistema</h3>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" formControlName="email" class="form-control" placeholder="exemplo@email.com">
      </div>
      
      <div class="form-group mb-4">
        <label class="form-label">Senha</label>
        <input type="password" formControlName="senha" class="form-control" maxlength="4" placeholder="****">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        Entrar
      </button>
    </form>
    
    <div class="register-link">
      Ainda não tem conta? <a routerLink="/autocadastro">Cadastre-se</a>
    </div>
  </div>
</div>
