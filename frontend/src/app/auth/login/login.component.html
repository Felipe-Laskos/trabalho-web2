<div class="login-wrapper">
  <div class="card shadow-sm login-card">
    <div class="card-body">
      <h3 class="card-title text-center mb-4">Acesso ao Sistema</h3>
      
      <form (ngSubmit)="efetuarLogin()" #formLogin="ngForm">
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" id="email" name="email" class="form-control" 
                 [(ngModel)]="usuario.email" required placeholder="Digite seu e-mail">
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" id="senha" name="senha" class="form-control" 
                 [(ngModel)]="usuario.senha" required maxlength="4" placeholder="****">
          <small class="text-muted">A senha possui 4 números.</small>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3" [disabled]="!formLogin.valid">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>
